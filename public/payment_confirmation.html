<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | GlucoSip Smart Cap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            background-image: radial-gradient(ellipse at center, rgba(0, 212, 170, 0.08) 0%, transparent 70%);
        }

        .confirmation-container {
            background: var(--dark-light);
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 24px;
            padding: 4rem 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 212, 170, 0.15);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glowing Success Circle */
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 170, 0.1);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.4);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 212, 170, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, 0); }
        }

        .success-icon svg {
            color: var(--primary);
            width: 40px;
            height: 40px;
        }

        .confirmation-container h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .confirmation-container p {
            color: var(--gray);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .details-box {
            background: var(--dark);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 700;
            color: var(--primary);
        }

        .detail-label {
            color: var(--gray);
        }

        .btn-home {
            display: inline-block;
            width: 100%;
            background: var(--gradient);
            color: var(--dark);
            padding: 1.25rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 170, 0.3);
        }
    </style>
</head>
<body>

    <div class="confirmation-container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h2>Payment Successful</h2>
        <p>Thank you for your order! Your GlucoSip Smart Cap is being prepared for shipment.</p>
        
        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Order Number</span>
                <span>#GS-84729</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date</span>
                <span>April 21, 2026</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Total Paid</span>
                <span>$79.00</span>
            </div>
        </div>

        <a href="index.html" class="btn-home">Return to Homepage</a>
    </div>

</body>
</html>
