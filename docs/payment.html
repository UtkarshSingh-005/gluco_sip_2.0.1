<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | GlucoSip Smart Cap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            background-image: radial-gradient(ellipse at center, rgba(0, 212, 170, 0.05) 0%, transparent 70%);
        }

        .payment-container {
            background: var(--dark-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s ease;
        }

        .payment-container:hover {
            border-color: rgba(0, 212, 170, 0.2);
        }

        .payment-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .payment-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .payment-header p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .order-summary {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-summary h4 {
            font-weight: 600;
            color: var(--light);
        }

        .order-summary .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.15);
        }

        button[type="submit"] {
            width: 100%;
            background: var(--gradient);
            color: var(--dark);
            padding: 1.25rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.3);
        }

        .secure-badge {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="payment-header">
            <h2>Checkout</h2>
            <p>Complete your purchase securely.</p>
        </div>

        <div class="order-summary">
            <div>
                <h4>GlucoSip Smart Cap</h4>
                <p style="color: var(--gray); font-size: 0.85rem;">Pro Tier Subscription included</p>
            </div>
            <div class="price">$79.00</div>
        </div>

        <form id="paymentForm">
            <div class="input-group">
                <label for="cardName">Name on Card</label>
                <input type="text" id="cardName" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="input-group">
                    <label for="cvv">CVV</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <button type="submit">Complete Payment - $79.00</button>
            
            <div class="secure-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure 256-bit SSL Encryption
            </div>
        </form>
    </div>

    <script>
        // Intercept form submission and redirect to confirmation page
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevents the page from reloading
            // Redirect to the confirmation page
            window.location.href = 'payment_confirmation.html';
        });
    </script>
</body>
</html>
